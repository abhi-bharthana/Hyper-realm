version: '3.8'

services:
  api-gateway:
    image: nginx:alpine
    container_name: hyper-api-gateway
    ports:
      - "8088:80" 
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hyper-id
      - hyper-hub
      - storage-api
      - hyper-search
      - sms-service
    networks:
      - hyper-realm-net

networks:
  hyper-realm-net:
    name: hyper-realm-net
    external: true