version: '3.8'

services:
  # ==========================================
  # VOLATILE DATA STORAGE
  # ==========================================
  hyper-redis:
    image: redis:alpine
    container_name: hyper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # EXABYTE SIMULATION OBJECT STORAGE 
  # ==========================================
  hyper-storage-node:
    image: minio/minio:latest
    container_name: hyper-storage-node
    ports:
      - "7480:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=7KF1I2CYE25G2R7HWCVL        
      - MINIO_ROOT_PASSWORD=2BYAzXng14JMBfjB3ZCj6SoHlSJqqzDL8Ke5LnBE 
    volumes:
      - hyper_ceph_mock:/data
    command: server /data --console-address ":9001"
    networks:
      - hyper-realm-net

  # ==========================================
  # EVENT DRIVEN TELEMETRY (Zookeeper + Kafka)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hyper-realm-zookeeper-1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128M -Xms128M"
    networks:
      - hyper-realm-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hyper-realm-kafka-1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    networks:
      - hyper-realm-net

  # ==========================================
  # PRIMARY STATE SYSTEM DATABASE
  # ==========================================
  hyper-db:
    image: postgres:15-alpine
    container_name: hyper-realm-hyper-db-1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=abhi
      - POSTGRES_PASSWORD=Abhi@5511
      - POSTGRES_DB=Hyper-ID
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abhi -d Hyper-ID"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - hyper-id_pgdata:/var/lib/postgresql/data
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # ENGINE COMPONENT SUB-SYSTEMS
  # ==========================================
  typesense:
    image: typesense/typesense:26.0
    container_name: hyper-realm-typesense-1
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=hyper_flash_key_5511 --enable-cors=true'
    networks:
      - hyper-realm-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hyper-realm-qdrant-1
    profiles: ["dev-extra"]
    mem_limit: 512m
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hyper-realm-net

# Centralized Network and Volumes for Infra
networks:
  hyper-realm-net:
    driver: bridge

volumes:
  hyper-id_pgdata:
  typesense_data:  
  qdrant_data:
  redis_data:
  hyper_ceph_mock: