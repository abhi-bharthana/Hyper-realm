services:
  # ==========================================
  # PRIMARY STATE SYSTEM DATABASE (PostgreSQL)
  # ==========================================
  hyper-db:
    image: postgres:15-alpine
    container_name: hyper-realm-hyper-db-1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - hyper-id_pgdata:/var/lib/postgresql/data
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # VOLATILE DATA STORAGE & PUB/SUB INTERFACE
  # ==========================================
  hyper-redis:
    image: redis:alpine
    container_name: hyper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - hyper-realm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # EVENT DRIVEN TELEMETRY (Kafka KRaft Mode)
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hyper-realm-kafka-1
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      CLUSTER_ID: "hyper-realm-cluster-v1"
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # EXABYTE SIMULATION OBJECT STORAGE
  # ==========================================
  hyper-storage-node:
    image: minio/minio:latest
    container_name: hyper-storage-node
    ports:
      - "7480:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - hyper_ceph_mock:/data
    command: server /data --console-address ":9001"
    networks:
      - hyper-realm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # ENGINE COMPONENT SUB-SYSTEMS
  # ==========================================
  typesense:
    image: typesense/typesense:26.0
    container_name: hyper-realm-typesense-1
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY} --enable-cors=true'
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 512M

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hyper-realm-qdrant-1
    profiles: ["dev-extra"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 512M