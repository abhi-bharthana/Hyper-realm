apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyper-storage-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage-api
  template:
    metadata:
      labels:
        app: storage-api
    spec:
      containers:
      - name: storage-api
        image: hyper-storage-api:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "hyper-redis-service"
        - name: S3_ENDPOINT
          value: "http://192.168.29.67:7480"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyper-sms-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sms-service
  template:
    metadata:
      labels:
        app: sms-service
    spec:
      containers:
      - name: sms-service
        image: hyper-sms-service:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        env:
        - name: KAFKA_SERVER
          value: "hyper-kafka-service:9092"
---
# 📦 Storage Service (Port 8000)
apiVersion: v1
kind: Service
metadata:
  name: hyper-storage-service
spec:
  type: NodePort
  selector:
    app: storage-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080
---
# 💬 SMS Service (Port 8001)
apiVersion: v1
kind: Service
metadata:
  name: hyper-sms-service
spec:
  type: NodePort
  selector:
    app: sms-service
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
      nodePort: 30081