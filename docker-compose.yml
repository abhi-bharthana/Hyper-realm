version: '3.8.0'

services:
  # ==========================================
  # 1. CORE IDENTITY & SECURITY LAYER (Go)
  # ==========================================
  hyper-id:
    build:
      context: ./services/hyper-id
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-id-1
    ports:
      - "8080:8080"
    depends_on:
      hyper-db:
        condition: service_healthy
    environment:
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - DB_USER=abhi
      - DB_PASSWORD=Abhi@5511
      - DB_NAME=Hyper-ID
      - GOOGLE_CLIENT_ID=306788201596-phllg7davd9ib2vkm1adrqrrv8r6ogoi.apps.googleusercontent.com
      - KAFKA_BROKER=kafka:9092
    volumes:
      - ./services/hyper-id/certs:/app/certs
    networks:
      - hyper-realm-net

  # ==========================================
  # 2. PROFILE & SOCIAL INTERACTION EDGE (Go)
  # ==========================================
  hyper-hub:
    build:
      context: ./services/hyper-hub
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-hub-1
    ports:
      - "8081:8081"
    depends_on:
      hyper-db:
        condition: service_healthy
    environment:
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - DB_USER=abhi
      - DB_PASSWORD=Abhi@5511
      - DB_NAME=Hyper-ID
      - KAFKA_BROKER=kafka:9092
      - JWT_PUBLIC_KEY_PATH=/app/certs/public_key.pem
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net

  # ==========================================
  # 3. VOLATILE DATA STORAGE & PUB/SUB INTERFACE
  # ==========================================
  hyper-redis:
    image: redis:alpine
    container_name: hyper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M # 🛡️ OPTIMIZATION: Prevents RAM exhaustion during heavy stream queries

  # ==========================================
  # 4. EXABYTE SIMULATION OBJECT STORAGE (Ceph/S3 Proxy)
  # ==========================================
  hyper-storage-node:
    image: minio/minio:latest
    container_name: hyper-storage-node
    ports:
      - "7480:9000"      # Maps host port 7480 straight to storage container internal S3 API
      - "9001:9001"      # Web Management UI Dashboard Console (Credentials same check standard)
    environment:
      - MINIO_ROOT_USER=7KF1I2CYE25G2R7HWCVL        
      - MINIO_ROOT_PASSWORD=2BYAzXng14JMBfjB3ZCj6SoHlSJqqzDL8Ke5LnBE 
    volumes:
      - hyper_ceph_mock:/data
    command: server /data --console-address ":9001"
    networks:
      - hyper-realm-net

  # ==========================================
  # 5. STORAGE API BROKER GATEWAY (Go)
  # ==========================================
  storage-api:
    build:
      context: ./services/storage-api
      dockerfile: Dockerfile
    container_name: hyper-realm-storage-api-1
    ports:
      - "8001:8001"
    environment:
      - PORT=:8001
      - REDIS_HOST=hyper-redis
      - S3_ENDPOINT=hyper-storage-node:9000 # 🎯 Direct internal network mesh mapping
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID} 
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY} 
    depends_on:
      - hyper-redis
      - hyper-storage-node 
    networks:
      - hyper-realm-net

  # ==========================================
  # 6. ASYNCHRONOUS TRANSACTION SYSTEM (Go)
  # ==========================================
  sms-service:
    build:
      context: ./services/sms-service
      dockerfile: Dockerfile
    container_name: hyper-realm-sms-service-1
    ports:
      - "8002:8002"
    environment:
      - PORT=:8002
      - REDIS_URL=hyper-redis:6379
      - KAFKA_SERVER=kafka:9092
      - PUBLIC_KEY_PATH=/app/certs/public_key.pem
    depends_on:
      kafka:
        condition: service_healthy
      hyper-redis:
        condition: service_started
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net

  # ==========================================
  # 7. EVENT DRIVEN TELEMETRY (Zookeeper + Kafka Cluster)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hyper-realm-zookeeper-1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128M -Xms128M"
    networks:
      - hyper-realm-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hyper-realm-kafka-1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    networks:
      - hyper-realm-net

  # ==========================================
  # 8. PRIMARY STATE SYSTEM DATABASE (PostgreSQL)
  # ==========================================
  hyper-db:
    image: postgres:15-alpine
    container_name: hyper-realm-hyper-db-1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=abhi
      - POSTGRES_PASSWORD=Abhi@5511
      - POSTGRES_DB=Hyper-ID
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abhi -d Hyper-ID"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - hyper-id_pgdata:/var/lib/postgresql/data
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 1G # 🛡️ OPTIMIZATION: Prevents relational node from swallowing workstation RAM

  # ==========================================
  # 9. ENGINE ENGINE COMPONENT SUB-SYSTEMS
  # ==========================================
  typesense:
    image: typesense/typesense:26.0
    container_name: hyper-realm-typesense-1
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=hyper_flash_key_5511 --enable-cors=true'
    networks:
      - hyper-realm-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hyper-realm-qdrant-1
    profiles: ["dev-extra"]
    mem_limit: 512m
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hyper-realm-net

  hyper-search:
    build:
      context: ./services/hyper-search
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-search-1
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BROKER=kafka:9092
      - TYPESENSE_URL=http://typesense:8108
    depends_on:
      kafka:
        condition: service_healthy
      typesense:
        condition: service_started
    networks:
      - hyper-realm-net

  # ==========================================
  # 10. MATRIX INFRASTRUCTURE WATCHDOGS (Telemetry Stack)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: hyper-realm-prometheus-1
    profiles: ["dev-extra"]
    ports:
      - "9090:9090"
    volumes:
      - ./services/matrix-infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1d'
    networks:
      - hyper-realm-net

  grafana:
    image: grafana/grafana:latest
    container_name: hyper-realm-grafana-1
    profiles: ["dev-extra"]
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hyper-realm-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: hyper-realm-alertmanager-1
    profiles: ["dev-extra"]
    ports:
      - "9093:9093"
    volumes:
      - ./services/matrix-infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - hyper-realm-net

# ==========================================
# FILE DATA SHARD STORAGE MAPS 
# ==========================================
networks:
  hyper-realm-net:
    driver: bridge

volumes:
  hyper-id_pgdata:
  typesense_data:  
  qdrant_data:
  prometheus_data:
  grafana_data:
  redis_data:
  hyper_ceph_mock: