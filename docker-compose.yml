services:
  # ==========================================
  # 1. CORE IDENTITY & SECURITY LAYER (Go)
  # ==========================================
  hyper-id:
    build:
      context: ./services/hyper-id
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-id-1
    ports:
      - "8080:8080"
    depends_on:
      hyper-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - KAFKA_BROKER=kafka:9092
    volumes:
      - ./services/hyper-id/certs:/app/certs
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # 2. PROFILE & SOCIAL INTERACTION EDGE (Go)
  # ==========================================
  hyper-hub:
    build:
      context: ./services/hyper-hub
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-hub-1
    ports:
      - "8081:8081"
    depends_on:
      hyper-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - KAFKA_BROKER=kafka:9092
      - JWT_PUBLIC_KEY_PATH=/app/certs/public_key.pem
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # 3. VOLATILE DATA STORAGE & PUB/SUB INTERFACE
  # ==========================================
  hyper-redis:
    image: redis:alpine
    container_name: hyper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - hyper-realm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # 4. EXABYTE SIMULATION OBJECT STORAGE (Ceph/S3 Proxy)
  # ==========================================
  hyper-storage-node:
    image: minio/minio:latest
    container_name: hyper-storage-node
    ports:
      - "7480:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - hyper_ceph_mock:/data
    command: server /data --console-address ":9001"
    networks:
      - hyper-realm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # 5. STORAGE API BROKER GATEWAY (Go)
  # ==========================================
  storage-api:
    build:
      context: ./services/storage-api
      dockerfile: Dockerfile
    container_name: hyper-realm-storage-api-1
    ports:
      - "8001:8001"
    environment:
      - PORT=:8001
      - REDIS_HOST=hyper-redis
      - S3_ENDPOINT=hyper-storage-node:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID} 
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY} 
    depends_on:
      hyper-redis:
        condition: service_healthy
      hyper-storage-node:
        condition: service_healthy
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # 6. ASYNCHRONOUS TRANSACTION SYSTEM (Python/FastAPI)
  # ==========================================
  hyper-canvas:
    build:
      context: ./services/hyper-canvas
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-canvas-1
    ports:
      - "8083:8083"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - JWT_PUBLIC_KEY_PATH=/app/certs/public_key.pem
    volumes:
      - ./services/hyper-canvas:/app
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    depends_on:
      hyper-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  sms-service:
    build:
      context: ./services/sms-service
      dockerfile: Dockerfile
    container_name: hyper-realm-sms-service-1
    ports:
      - "8002:8002"
    environment:
      - PORT=:8002
      - REDIS_URL=hyper-redis:6379
      - KAFKA_SERVER=kafka:9092
      - PUBLIC_KEY_PATH=/app/certs/public_key.pem
    depends_on:
      kafka:
        condition: service_healthy
      hyper-redis:
        condition: service_healthy
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # 7. EVENT DRIVEN TELEMETRY (Kafka KRaft Mode)
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hyper-realm-kafka-1
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      CLUSTER_ID: "hyper-realm-cluster-v1"
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # 8. PRIMARY STATE SYSTEM DATABASE (PostgreSQL)
  # ==========================================
  hyper-db:
    image: postgres:15-alpine
    container_name: hyper-realm-hyper-db-1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - hyper-id_pgdata:/var/lib/postgresql/data
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # 9. ENGINE COMPONENT SUB-SYSTEMS
  # ==========================================
  typesense:
    image: typesense/typesense:26.0
    container_name: hyper-realm-typesense-1
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY} --enable-cors=true'
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 512M

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hyper-realm-qdrant-1
    profiles: ["dev-extra"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 512M

  hyper-search:
    build:
      context: ./services/hyper-search
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-search-1
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BROKER=kafka:9092
      - TYPESENSE_URL=http://typesense:8108
    depends_on:
      kafka:
        condition: service_healthy
      typesense:
        condition: service_started
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # 🚀 10. CLOUD OS STATE MANAGER (Go) - NAYA ADD KIYA HAI
  # ==========================================
  hyper-os:
    build:
      context: ./services/hyper-os
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-os-1
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=host=hyper-db user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} port=5432 sslmode=disable
      - JWT_PUBLIC_KEY_PATH=/app/certs/public_key.pem
    depends_on:
      hyper-db:
        condition: service_healthy
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # 🌐 11. API GATEWAY (NGINX - Central Routing)
  # ==========================================
  api-gateway:
    image: nginx:alpine
    container_name: hyper-api-gateway
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hyper-id
      - hyper-hub
      - storage-api
      - hyper-search
      - sms-service
      - hyper-canvas
      - hyper-os # 👈 NGINX KO BHI BATA DIYA KI YE SERVICE HAI
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 128M
      
  # ==========================================
  # 12. MATRIX INFRASTRUCTURE WATCHDOGS (Telemetry Stack)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: hyper-realm-prometheus-1
    profiles: ["dev-extra"]
    ports:
      - "9090:9090"
    volumes:
      - ./services/matrix-infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1d'
    networks:
      - hyper-realm-net

  grafana:
    image: grafana/grafana:latest
    container_name: hyper-realm-grafana-1
    profiles: ["dev-extra"]
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hyper-realm-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: hyper-realm-alertmanager-1
    profiles: ["dev-extra"]
    ports:
      - "9093:9093"
    volumes:
      - ./services/matrix-infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - hyper-realm-net

# ==========================================
# FILE DATA SHARD STORAGE MAPS 
# ==========================================
networks:
  hyper-realm-net:
    driver: bridge

volumes:
  hyper-id_pgdata:
  typesense_data:  
  qdrant_data:
  prometheus_data:
  grafana_data:
  redis_data:
  hyper_ceph_mock: