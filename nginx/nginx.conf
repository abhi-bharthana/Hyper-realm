events {
    worker_connections 1024;
}

http {
    # 🔌 Upstreams
    upstream hyper_id { server hyper-realm-hyper-id-1:8080; }
    upstream hyper_hub { server hyper-realm-hyper-hub-1:8081; }
    upstream storage_api { server hyper-realm-storage-api-1:8001; }
    upstream hyper_search { server hyper-realm-hyper-search-1:8082; }
    upstream sms_service { server hyper-realm-sms-service-1:8002; }

    server {
        listen 80;
        
        # 🛡️ GLOBAL CORS SETTINGS (Saare routes automatically inherit karenge)
        # $http_origin use kiya hai taaki mobile aur PC dono se test kar sake
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept, Origin, Content-Type, Authorization, X-Google-Token, X-User-ID' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # 🔀 MICROSERVICES ROUTING LOGIC

        location /api/v1/auth/ { 
            # Preflight requests instantly solve
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://hyper_id; 
            proxy_set_header Host $host; 
        }
        
        location /api/v1/profile { 
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://hyper_hub; 
            proxy_set_header Host $host; 
        }
        
        location /api/v1/users/ { 
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://hyper_hub; 
            proxy_set_header Host $host; 
        }
        
        location /api/v1/settings { 
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://hyper_hub; 
            proxy_set_header Host $host; 
        }
        
        location = /api/v1/search { 
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://hyper_hub; 
            proxy_set_header Host $host; 
        } 

        location /api/v1/search/flash { 
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://hyper_search; 
            proxy_set_header Host $host; 
        }
        
        location /api/v1/search/index { 
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://hyper_search; 
            proxy_set_header Host $host; 
        }

        location /api/v1/storage/ {
            if ($request_method = 'OPTIONS') { return 204; }
            client_max_body_size 100M;
            proxy_pass http://storage_api;
            proxy_set_header Host $host;
        }

        location /ws/ {
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://sms_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; 
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}