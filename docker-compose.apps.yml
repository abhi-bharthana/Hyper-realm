services:
  # ==========================================
  # CORE IDENTITY & SECURITY LAYER (Go)
  # ==========================================
  hyper-id:
    build:
      context: ./services/hyper-id
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-id-1
    ports:
      - "8080:8080"
    depends_on:
      hyper-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - KAFKA_BROKER=kafka:9092
    volumes:
      - ./services/hyper-id/certs:/app/certs
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # PROFILE & SOCIAL INTERACTION EDGE (Go)
  # ==========================================
  hyper-hub:
    build:
      context: ./services/hyper-hub
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-hub-1
    ports:
      - "8081:8081"
    depends_on:
      hyper-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - KAFKA_BROKER=kafka:9092
      - JWT_PUBLIC_KEY_PATH=/app/certs/public_key.pem
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # STORAGE API BROKER GATEWAY (Go)
  # ==========================================
  storage-api:
    build:
      context: ./services/storage-api
      dockerfile: Dockerfile
    container_name: hyper-realm-storage-api-1
    ports:
      - "8001:8001"
    environment:
      - PORT=:8001
      - REDIS_HOST=hyper-redis
      - S3_ENDPOINT=hyper-storage-node:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID} 
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY} 
    depends_on:
      hyper-redis:
        condition: service_healthy
      hyper-storage-node:
        condition: service_healthy
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # ASYNCHRONOUS TRANSACTION SYSTEM & SMS
  # ==========================================
  hyper-canvas:
    build:
      context: ./services/hyper-canvas
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-canvas-1
    ports:
      - "8083:8083"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=hyper-db
      - DB_PORT=5432
      - JWT_PUBLIC_KEY_PATH=/app/certs/public_key.pem
    volumes:
      - ./services/hyper-canvas:/app
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    depends_on:
      hyper-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  sms-service:
    build:
      context: ./services/sms-service
      dockerfile: Dockerfile
    container_name: hyper-realm-sms-service-1
    ports:
      - "8002:8002"
    environment:
      - PORT=:8002
      - REDIS_URL=hyper-redis:6379
      - KAFKA_SERVER=kafka:9092
      - PUBLIC_KEY_PATH=/app/certs/public_key.pem
    depends_on:
      kafka:
        condition: service_healthy
      hyper-redis:
        condition: service_healthy
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # CLOUD OS STATE MANAGER (Go)
  # ==========================================
  hyper-os:
    build:
      context: ./services/hyper-os
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-os-1
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=host=hyper-db user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} port=5432 sslmode=disable
      - JWT_PUBLIC_KEY_PATH=/app/certs/public_key.pem
    depends_on:
      hyper-db:
        condition: service_healthy
    volumes:
      - ./services/hyper-id/certs:/app/certs:ro
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # SEARCH ENGINE API
  # ==========================================
  hyper-search:
    build:
      context: ./services/hyper-search
      dockerfile: Dockerfile
    container_name: hyper-realm-hyper-search-1
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BROKER=kafka:9092
      - TYPESENSE_URL=http://typesense:8108
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # API GATEWAY (NGINX)
  # ==========================================
  api-gateway:
    image: nginx:alpine
    container_name: hyper-api-gateway
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hyper-id
      - hyper-hub
      - storage-api
      - hyper-search
      - sms-service
      - hyper-canvas
      - hyper-os
    networks:
      - hyper-realm-net
    deploy:
      resources:
        limits:
          memory: 128M