apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyper-id-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: id-db
  template:
    metadata:
      labels:
        app: id-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine #
        env:
        - name: POSTGRES_USER
          valueFrom: { secretKeyRef: { name: hyper-id-db-secrets, key: DB_USER } }
        - name: POSTGRES_PASSWORD
          valueFrom: { secretKeyRef: { name: hyper-id-db-secrets, key: DB_PASSWORD } }
        - name: POSTGRES_DB
          valueFrom: { secretKeyRef: { name: hyper-id-db-secrets, key: DB_NAME } }
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: hyper-id-db-service
spec:
  selector:
    app: id-db
  ports:
    - port: 5432